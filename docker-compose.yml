name: api-control-plane

services:
  mysql:
    image: mysql:8.4
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --innodb-buffer-pool-size=256M
      - --max_connections=120
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: apictrl
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
      - ./infra/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -proot --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    environment:
      APP_BIND: 0.0.0.0:8080
      MYSQL_URL: mysql://root:root@mysql:3306/apictrl
      REDIS_URL: redis://redis:6379
      MYSQL_MAX_CONNECTIONS: 15
      CACHE_TTL_SECONDS: 300
      AUTH_ENABLED: "false"
      JWT_SECRET: dev-change-this-secret
      ADMIN_DEFAULT_PASSWORD: admin
      CORS_ALLOWED_ORIGINS: http://localhost
      RUST_LOG: info
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: ""
      NEXT_PUBLIC_API_TOKEN: "dev-token"
      NEXTAUTH_URL: http://localhost
      NEXTAUTH_SECRET: dev-sec-secret
    depends_on:
      backend:
        condition: service_started
    expose:
      - "3000"
    restart: unless-stopped

  gateway:
    image: openresty/openresty:1.27.1.2-0-bookworm
    volumes:
      - ./infra/openresty/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  mysql_data:
