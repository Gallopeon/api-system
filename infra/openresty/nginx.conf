worker_processes 1;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 30;
    client_max_body_size 2m;

    # Docker embedded DNS resolver. Re-resolve every 30s so container IP
    # changes (after rebuild / restart) don't cause 502 cascades.
    resolver 127.0.0.11 valid=30s ipv6=off;
    resolver_timeout 3s;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Single-node 2C2G guardrail: per-IP ingress shaping for API traffic.
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=120r/s;
    # Login brute-force protection: strict rate limit on admin auth endpoints
    limit_req_zone $binary_remote_addr zone=admin_limit:10m rate=10r/m;

    # Proxy cache for backend responses (disk-based, survives restarts)
    proxy_cache_path /tmp/nginx_cache levels=1:2 keys_zone=api_cache:10m max_size=50m inactive=10m;

    # Shared dictionary for API key validation cache (10m ≈ ~50k entries)
    lua_shared_dict apikey_cache 10m;
    # Shared dictionary for rate limit counters
    lua_shared_dict ratelimit_counters 20m;
    # Shared dictionary for response cache (50MB)
    lua_shared_dict response_cache 50m;

    # Map of paths that skip API key validation (data-plane paths that are internal utilities)
    map $request_uri $skip_apikey_check {
        default 0;
        ~^/api/v1/api-keys/validate  1;
        ~^/api/v1/rate-limits/check   1;
        ~^/api/v1/metrics/ingest      1;
    }

    server {
        listen 80 reuseport;
        server_name _;

        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "0" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ── Internal subrequest: health ──
        location = /health/live {
            set $backend_addr backend:8080;
            proxy_set_header Host $host;
            proxy_connect_timeout 5s;
            proxy_read_timeout 5s;
            proxy_cache api_cache;
            proxy_cache_key "$scheme$request_method$host$request_uri";
            proxy_cache_valid 200 10s;
            proxy_cache_use_stale error timeout updating;
            proxy_pass http://$backend_addr/health/live;
        }

        location = /health/ready {
            set $backend_addr backend:8080;
            proxy_set_header Host $host;
            proxy_connect_timeout 5s;
            proxy_read_timeout 5s;
            proxy_cache api_cache;
            proxy_cache_key "$scheme$request_method$host$request_uri";
            proxy_cache_valid 200 10s;
            proxy_cache_use_stale error timeout updating;
            proxy_pass http://$backend_addr/health/ready;
        }

        # Internal subrequest endpoint for API key validation
        location = /internal/validate-key {
            internal;
            set $backend_addr backend:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Content-Type application/json;
            proxy_pass http://$backend_addr/api/v1/api-keys/validate;
        }

        # Internal subrequest endpoint for rate limit check
        location = /internal/check-ratelimit {
            internal;
            set $backend_addr backend:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Content-Type application/json;
            proxy_pass http://$backend_addr/api/v1/rate-limits/check;
        }

        # Internal subrequest endpoint for metrics ingestion
        location = /internal/ingest-metrics {
            internal;
            set $backend_addr backend:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Content-Type application/json;
            proxy_pass http://$backend_addr/api/v1/metrics/ingest;
        }

        # Cache expensive metrics dashboard query (30s TTL, bypass on auth header)
        location = /admin/v1/metrics/dashboard {
            set $backend_addr backend:8080;
            limit_req zone=admin_limit burst=10 nodelay;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_cache api_cache;
            proxy_cache_key "$scheme$request_method$host$request_uri$http_authorization";
            proxy_cache_valid 200 30s;
            proxy_cache_use_stale error timeout updating;
            proxy_connect_timeout 2s;
            proxy_send_timeout 15s;
            proxy_read_timeout 15s;
            proxy_pass http://$backend_addr;
        }

        # ── Admin Plane: management API, JWT auth (no API key check) ──
        location /admin/ {
            set $backend_addr backend:8080;
            limit_req zone=admin_limit burst=10 nodelay;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_connect_timeout 2s;
            proxy_send_timeout 15s;
            proxy_read_timeout 15s;
            proxy_pass http://$backend_addr;
        }

        # ── Auth routes: forwarded to frontend NextAuth ──
        location /api/auth {
            set $frontend_addr frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://$frontend_addr;
        }

        # ── Proxy routes: forwarded to frontend Next.js proxy handler ──
        # The proxy handler at /api/proxy/[...path] reads the backend JWT from the
        # server-side NextAuth token and injects it as an Authorization: Bearer header.
        location /api/proxy/ {
            set $frontend_addr frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://$frontend_addr;
        }

        # ── Data Plane: external proxy, API key + rate limiting ──
        location /api/ {
            set $backend_addr backend:8080;
            limit_req zone=api_limit burst=240 nodelay;

            # API Key validation via access_by_lua
            access_by_lua_block {
                local cjson = require "cjson"

                -- Skip validation for api-keys management endpoints and health checks
                if ngx.var.skip_apikey_check == "1" then
                    return
                end

                -- Extract API key from header or query parameter
                local api_key = ngx.req.get_headers()["X-API-Key"]
                if not api_key or api_key == "" then
                    local args = ngx.req.get_uri_args()
                    api_key = args["api_key"]
                end

                -- Bypass API key check if Bearer token (JWT) is present — dashboard users
                local auth_header = ngx.req.get_headers()["Authorization"]
                if auth_header and string.find(auth_header, "^Bearer ") then
                    return
                end

                local uri = ngx.var.uri

                -- Data plane: all /api/ endpoints require API key (no exceptions)
                if not api_key or api_key == "" then
                    ngx.header["Content-Type"] = "application/json"
                    ngx.status = 401
                    ngx.say('{"error":"unauthorized","message":"Missing API key. Use /admin/ for management APIs."}')
                    return ngx.exit(401)
                end

                -- Check API key cache
                local cache = ngx.shared.apikey_cache
                local cached = cache:get("ak:" .. api_key)
                if cached == "valid" then
                    -- proceed to rate limit check
                elseif cached == "invalid" then
                    ngx.header["Content-Type"] = "application/json"
                    ngx.status = 401
                    ngx.say('{"error":"unauthorized","message":"Invalid or expired API key."}')
                    return ngx.exit(401)
                else
                    -- Validate via backend subrequest
                    local res = ngx.location.capture("/internal/validate-key", {
                        method = ngx.HTTP_POST,
                        body = cjson.encode({ api_key = api_key, api_path = uri }),
                        headers = { ["Content-Type"] = "application/json" }
                    })
                    if res.status == 200 then
                        local ok, body = pcall(cjson.decode, res.body)
                        if ok and body.valid then
                            cache:set("ak:" .. api_key, "valid", 60)
                        else
                            cache:set("ak:" .. api_key, "invalid", 10)
                            ngx.header["Content-Type"] = "application/json"
                            ngx.status = 401
                            ngx.say('{"error":"unauthorized","message":"Invalid or expired API key."}')
                            return ngx.exit(401)
                        end
                    else
                        cache:set("ak:" .. api_key, "invalid", 10)
                        ngx.header["Content-Type"] = "application/json"
                        ngx.status = 401
                        ngx.say('{"error":"unauthorized","message":"Invalid or expired API key."}')
                        return ngx.exit(401)
                    end
                end

                -- Rate limit check using local shared dict
                local rl_cache = ngx.shared.ratelimit_counters
                local rl_key = "rl:" .. uri .. ":" .. (api_key or "anon")
                local client_ip = ngx.var.binary_remote_addr
                local rl_ip_key = "rl:" .. uri .. ":ip:" .. client_ip

                local now = ngx.now()
                local window = 60  -- default 60s window
                local window_start = now - window

                -- Simple counting using local dict (supplemented by backend check)
                local ip_count = rl_cache:get(rl_ip_key)
                if ip_count and tonumber(ip_count) > 1000 then
                    ngx.header["Content-Type"] = "application/json"
                    ngx.header["X-RateLimit-Limit"] = "1000"
                    ngx.header["X-RateLimit-Remaining"] = "0"
                    ngx.header["X-RateLimit-Reset"] = tostring(math.ceil(now + window))
                    ngx.status = 429
                    ngx.say('{"error":"rate_limit_exceeded","message":"Too many requests. Please try again later."}')
                    return ngx.exit(429)
                end

                -- Backend rate limit check
                local rl_res = ngx.location.capture("/internal/check-ratelimit", {
                    method = ngx.HTTP_POST,
                    body = cjson.encode({ api_path = uri, api_key = api_key or "", client_ip = client_ip }),
                    headers = { ["Content-Type"] = "application/json" }
                })

                if rl_res.status == 200 then
                    local ok, rl_body = pcall(cjson.decode, rl_res.body)
                    if ok and rl_body then
                        ngx.header["X-RateLimit-Limit"] = tostring(rl_body.limit or 0)
                        ngx.header["X-RateLimit-Remaining"] = tostring(rl_body.remaining or 0)
                        ngx.header["X-RateLimit-Reset"] = tostring(rl_body.reset_seconds or 60)
                        if not rl_body.allowed then
                            ngx.header["Content-Type"] = "application/json"
                            ngx.status = 429
                            ngx.say('{"error":"rate_limit_exceeded","message":"' .. (rl_body.reason or "Rate limit exceeded") .. '"}')
                            return ngx.exit(429)
                        end
                    end
                end

                -- Increment local counter
                local new_count = (tonumber(ip_count) or 0) + 1
                rl_cache:set(rl_ip_key, new_count, window)
            }

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_connect_timeout 2s;
            proxy_send_timeout 15s;
            proxy_read_timeout 15s;
            proxy_pass http://$backend_addr;

            # Log metrics after response
            log_by_lua_block {
                local cjson = require "cjson"
                local latency = ngx.now() - (ngx.ctx.request_start_time or ngx.now())
                local metrics_body = cjson.encode({
                    api_path = ngx.var.uri,
                    method = ngx.req.get_method(),
                    status_code = ngx.status,
                    latency_ms = math.floor(latency * 1000),
                    client_ip = ngx.var.remote_addr,
                    api_key_id = ngx.ctx.api_key_id
                })
                -- Fire-and-forget subrequest to ingest metrics
                ngx.location.capture("/internal/ingest-metrics", {
                    method = ngx.HTTP_POST,
                    body = metrics_body,
                    headers = { ["Content-Type"] = "application/json" }
                })
            }

            # Store request start time for latency calculation
            set $request_start_time $msec;
            rewrite_by_lua_block {
                ngx.ctx.request_start_time = ngx.now()
            }
        }

        # ── Frontend (SPA, catch-all) ──
        location / {
            set $frontend_addr frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://$frontend_addr;
        }
    }
}
