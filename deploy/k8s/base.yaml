apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: api-control-plane
type: Opaque
stringData:
  root-password: root
---
apiVersion: v1
kind: Secret
metadata:
  name: backend-auth-secret
  namespace: api-control-plane
type: Opaque
stringData:
  jwt-secret: dev-change-this-secret
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: api-control-plane
data:
  MYSQL_DATABASE: apictrl
  MYSQL_MAX_CONNECTIONS: "20"
  CACHE_TTL_SECONDS: "300"
  AUTH_ENABLED: "false"
  CORS_ALLOWED_ORIGINS: http://localhost
  RUST_LOG: info
  APP_BIND: 0.0.0.0:8080
  MYSQL_URL: mysql://root:root@mysql:3306/apictrl
  REDIS_URL: redis://redis:6379
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-data
  namespace: api-control-plane
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: api-control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.4
          args:
            - --character-set-server=utf8mb4
            - --collation-server=utf8mb4_0900_ai_ci
            - --innodb-buffer-pool-size=256M
            - --max_connections=120
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: root-password
            - name: MYSQL_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: MYSQL_DATABASE
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
          readinessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 20
            periodSeconds: 10
      volumes:
        - name: mysql-data
          persistentVolumeClaim:
            claimName: mysql-data
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: api-control-plane
spec:
  selector:
    app: mysql
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: api-control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7.4-alpine
          args:
            - redis-server
            - --save
            - ""
            - --appendonly
            - "no"
            - --maxmemory
            - 128mb
            - --maxmemory-policy
            - allkeys-lru
          ports:
            - containerPort: 6379
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: api-control-plane
spec:
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: api-control-plane
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: api-control-plane-backend:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: app-config
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-auth-secret
                  key: jwt-secret
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: api-control-plane
spec:
  selector:
    app: backend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: api-control-plane
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: api-control-plane-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "192Mi"
            limits:
              cpu: "500m"
              memory: "384Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: api-control-plane
spec:
  selector:
    app: frontend
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-nginx-config
  namespace: api-control-plane
data:
  nginx.conf: |
    worker_processes 1;
    worker_rlimit_nofile 65535;

    events {
      worker_connections 4096;
      use epoll;
      multi_accept on;
    }

    http {
      include       mime.types;
      default_type  application/octet-stream;
      sendfile on;
      tcp_nopush on;
      tcp_nodelay on;
      keepalive_timeout 30;
      client_max_body_size 2m;

      map $http_upgrade $connection_upgrade {
          default upgrade;
          ''      close;
      }

      limit_req_zone $binary_remote_addr zone=api_limit:10m rate=120r/s;

      upstream frontend_upstream {
          server frontend:3000;
          keepalive 32;
      }

      upstream backend_upstream {
          server backend:8080;
          keepalive 64;
      }

      server {
          listen 80;
          server_name _;

          location = /health/live {
              proxy_set_header Host $host;
              proxy_pass http://backend_upstream/health/live;
          }

          location = /health/ready {
              proxy_set_header Host $host;
              proxy_pass http://backend_upstream/health/ready;
          }

          location /api/ {
              limit_req zone=api_limit burst=240 nodelay;
              proxy_http_version 1.1;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
              proxy_set_header Connection "";
              proxy_connect_timeout 2s;
              proxy_send_timeout 15s;
              proxy_read_timeout 15s;
              proxy_pass http://backend_upstream;
          }

          location / {
              proxy_http_version 1.1;
              proxy_set_header Upgrade $http_upgrade;
              proxy_set_header Connection $connection_upgrade;
              proxy_set_header Host $host;
              proxy_set_header X-Forwarded-Proto $scheme;
              proxy_pass http://frontend_upstream;
          }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: api-control-plane
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: openresty/openresty:1.27.1.2-0-bookworm
          ports:
            - containerPort: 80
          volumeMounts:
            - name: gateway-config
              mountPath: /usr/local/openresty/nginx/conf/nginx.conf
              subPath: nginx.conf
          readinessProbe:
            httpGet:
              path: /health/live
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: gateway-config
          configMap:
            name: gateway-nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: api-control-plane
spec:
  selector:
    app: gateway
  ports:
    - name: http
      port: 80
      targetPort: 80
  type: LoadBalancer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: api-control-plane
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
